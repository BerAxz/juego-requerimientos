<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jetpack Control – Endless Runner con ML5</title>
  <meta name="description" content="Prototipo de endless runner estilo Jetpack Joyride controlado con la cámara usando Teachable Machine y ml5.js" />

  <!-- ================================================
       LIBRERÍAS EXTERNAS
       p5.js  → motor de dibujo y matemáticas
       ml5.js → clasificador de imágenes (Teachable Machine)
       Usamos versiones CDN. ml5 v0.12.2 es compatible con imageClassifier.
  ================================================ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>

  <style>
    /* ================================================
       ESTILOS GLOBALES
       Fondo negro total, sin márgenes, fuente pixelada
    ================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* El canvas de p5.js se centra automáticamente */
    canvas {
      display: block;
    }

    /* Panel de instrucciones superpuesto (se oculta al iniciar) */
    #instrucciones {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.88);
      color: #00ffcc;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 10;
      text-align: center;
      padding: 24px;
    }

    #instrucciones h1 {
      font-size: 2.4rem;
      color: #ff00aa;
      text-shadow: 0 0 20px #ff00aa;
      letter-spacing: 4px;
    }

    #instrucciones p {
      font-size: 1rem;
      max-width: 520px;
      line-height: 1.7;
      color: #aaffee;
    }

    #instrucciones .etiqueta {
      background: #ff00aa22;
      border: 1px solid #ff00aa;
      border-radius: 8px;
      padding: 8px 20px;
      color: #ff00aa;
      font-size: 0.9rem;
    }

    #btn-iniciar {
      margin-top: 12px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #ff00aa, #7700ff);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 1.2rem;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      box-shadow: 0 0 24px #ff00aaaa;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    #btn-iniciar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px #ff00aa;
    }

    #instrucciones.oculto {
      display: none;
    }
  </style>
</head>

<body>

<!-- PANEL DE BIENVENIDA -->
<div id="instrucciones">
  <h1>⚡ JETPACK CTRL ⚡</h1>
  <p>
    Controla al personaje con tu <strong>mano frente a la cámara</strong>.<br><br>
    🖐️ <strong>Mano ABIERTA</strong> → Jetpack activado (sube)<br>
    ✊ <strong>Mano CERRADA</strong> → Jetpack apagado (cae)<br><br>
    Esquiva los obstáculos y recolecta monedas.
  </p>
  <div class="etiqueta">Se necesita permiso de cámara para jugar</div>
  <button id="btn-iniciar" onclick="iniciarJuego()">▶ INICIAR JUEGO</button>
</div>

<!-- ================================================
     SKETCH.JS EMBEBIDO
     Todo el código del juego vive aquí dentro del tag <script>
================================================ -->
<script>
// ============================================================
//  CONFIGURACIÓN DEL MODELO DE TEACHABLE MACHINE
//  ➡  Reemplaza la URL con el enlace de tu modelo exportado
//     desde teachablemachine.withgoogle.com
//     El link debe terminar en "/" y apuntar a la carpeta
//     que contiene model.json, metadata.json y weights.bin
// ============================================================
let imageModelURL = 'TU_LINK_AQUI/';

// ============================================================
//  CONSTANTES Y VARIABLES GLOBALES DEL JUEGO
// ============================================================

// Dimensiones del canvas
const ANCHO  = 900;
const ALTO   = 500;

// Física – se pueden ajustar para cambiar la sensación del juego
const GRAVEDAD       = 0.5;   // Aceleración gravitacional (px/frame²)
const FUERZA_JETPACK = 0.9;   // Fuerza opuesta a la gravedad al volar
const VEL_MAXIMA     = 8;     // Velocidad vertical máxima (caps de caída)
const VEL_MUNDO      = 4;     // Velocidad horizontal del mundo (obstáculos)

// Suelo y techo (márgenes internos del canvas)
const SUELO = ALTO - 40;
const TECHO = 40;

// Intervalo de aparición de obstáculos y monedas (en frames)
const INTERVALO_OBSTACULO = 90;
const INTERVALO_MONEDA    = 60;

// Estado del juego
let estado = 'esperando'; // 'esperando' | 'jugando' | 'gameOver'
let puntaje    = 0;
let frameInicio = 0; // frame en que comenzó la partida (para distancia)

// Objetos del mundo
let jugador;
let obstaculos = [];
let monedas    = [];
let capas      = []; // capas del parallax de fondo

// ML5 – cámara y clasificador
let captura;        // elemento de video (createCapture)
let clasificador;   // el modelo de Teachable Machine
let etiquetaActual  = 'Esperando...';
let confianzaActual = 0;
let modeloCargado   = false;
let juegoIniciado   = false;

// Partículas del jetpack (efecto visual)
let particulas = [];

// ============================================================
//  FUNCIÓN PÚBLICA – llamada por el botón HTML
// ============================================================
function iniciarJuego() {
  document.getElementById('instrucciones').classList.add('oculto');
  juegoIniciado = true;
  // p5.js ya está corriendo; el juego esperará a que el modelo cargue
}

// ============================================================
//  SETUP – se ejecuta UNA VEZ al cargar la página
// ============================================================
function setup() {
  // Creamos el canvas y lo adjuntamos al body
  let canvas = createCanvas(ANCHO, ALTO);
  canvas.parent(document.body);

  // Activamos suavizado de fuentes
  textFont('Courier New');

  // ── Cámara ──────────────────────────────────────────────
  // createCapture(VIDEO) activa la cámara del usuario.
  // La ocultamos del DOM porque la dibujaremos nosotros en p5.
  captura = createCapture(VIDEO, () => {
    console.log('✅ Cámara lista');
    cargarModelo(); // arrancamos el modelo solo cuando la cámara está lista
  });
  captura.size(224, 224); // tamaño esperado por Teachable Machine
  captura.hide();

  // ── Fondo Parallax ──────────────────────────────────────
  // Creamos varias "capas" de rectángulos/líneas con distintas
  // velocidades para simular profundidad tridimensional.
  inicializarParallax();

  // ── Jugador ─────────────────────────────────────────────
  jugador = new Player(120, ALTO / 2);
}

// ============================================================
//  CARGAR MODELO – se llama después de que la cámara está lista
// ============================================================
function cargarModelo() {
  // ml5.imageClassifier recibe la URL del modelo y la fuente de video.
  // El tercer argumento es el callback que se ejecuta cuando carga.
  // NOTA: Esta es la API compatible con ml5 v0.12.x
  clasificador = ml5.imageClassifier(imageModelURL + 'model.json', captura, () => {
    console.log('✅ Modelo cargado');
    modeloCargado = true;
    clasificar(); // iniciamos el loop de clasificación
  });
}

// ============================================================
//  LOOP DE CLASIFICACIÓN – se llama a sí mismo continuamente
//  Esto es asíncrono y corre en paralelo al draw() de p5
// ============================================================
function clasificar() {
  // classify() analiza el frame actual del video y devuelve
  // un array de resultados: [{ label, confidence }, ...]
  clasificador.classify(captura, (error, resultados) => {
    if (error) {
      console.warn('Error de clasificación:', error);
    } else {
      // El primer resultado es siempre el de mayor confianza
      etiquetaActual  = resultados[0].label;
      confianzaActual = resultados[0].confidence;
    }
    // Volvemos a clasificar → crea un loop continuo de predicciones
    clasificar();
  });
}

// ============================================================
//  DRAW – se ejecuta ~60 veces por segundo (el "game loop")
// ============================================================
function draw() {
  // Fondo base negro con ligero desvanecimiento (motion blur sutil)
  background(10, 10, 20);

  // ── 1. DIBUJAR FONDO PARALLAX ───────────────────────────
  dibujarParallax();

  // ── 2. SUELO Y TECHO ────────────────────────────────────
  dibujarAmbiente();

  // ── 3. LÓGICA SEGÚN ESTADO DEL JUEGO ────────────────────
  if (estado === 'jugando') {
    actualizarJuego();
  } else if (estado === 'gameOver') {
    mostrarGameOver();
  } else {
    // Estado 'esperando': mostramos pantalla de carga
    mostrarCarga();
  }

  // ── 4. HUD (puntaje, distancia) ──────────────────────────
  if (estado === 'jugando' || estado === 'gameOver') {
    dibujarHUD();
  }

  // ── 5. VISOR DE CÁMARA (esquina inferior derecha) ────────
  mostrarCamara();
}

// ============================================================
//  ACTUALIZAR JUEGO – lógica principal por frame
// ============================================================
function actualizarJuego() {

  // ── Interpretar etiqueta del modelo ─────────────────────
  // Si la confianza es baja (<60%), ignoramos la predicción
  if (modeloCargado && confianzaActual > 0.6) {
    if (etiquetaActual === 'Abierta') {
      jugador.volar();   // jetpack encendido → fuerza hacia arriba
    }
    // Si es 'Cerrada' o cualquier otra → no volamos (cae por gravedad)
  }

  // ── Spawn de obstáculos ──────────────────────────────────
  // Cada N frames creamos un obstáculo en el borde derecho
  if (frameCount % INTERVALO_OBSTACULO === 0) {
    obstaculos.push(new Obstacle());
  }

  // ── Spawn de monedas ─────────────────────────────────────
  if (frameCount % INTERVALO_MONEDA === 0) {
    monedas.push(new Coin());
  }

  // ── Actualizar y dibujar partículas ──────────────────────
  // Las partículas nacen cuando el jetpack está activo
  for (let i = particulas.length - 1; i >= 0; i--) {
    particulas[i].update();
    particulas[i].show();
    if (particulas[i].muerta()) particulas.splice(i, 1);
  }

  // ── Actualizar y dibujar jugador ─────────────────────────
  jugador.update();
  jugador.show();

  // ── Actualizar obstáculos ────────────────────────────────
  for (let i = obstaculos.length - 1; i >= 0; i--) {
    obstaculos[i].update();
    obstaculos[i].show();

    // Colisión Jugador vs Obstáculo (AABB – Axis-Aligned Bounding Box)
    if (colisionAABB(jugador, obstaculos[i])) {
      activarGameOver();
      return; // salimos del loop para no seguir actualizando
    }

    // Eliminar obstáculos que salen del canvas por la izquierda
    if (obstaculos[i].x < -obstaculos[i].w) {
      obstaculos.splice(i, 1);
    }
  }

  // ── Actualizar monedas ───────────────────────────────────
  for (let i = monedas.length - 1; i >= 0; i--) {
    monedas[i].update();
    monedas[i].show();

    // Colisión Jugador vs Moneda (circular – más permisiva y suave)
    if (colisionCircular(jugador, monedas[i])) {
      puntaje += 10;
      monedas.splice(i, 1);
      continue;
    }

    // Eliminar monedas fuera del canvas
    if (monedas[i].x < -20) {
      monedas.splice(i, 1);
    }
  }

  // ── Puntaje por supervivencia ────────────────────────────
  // Cada 30 frames sumamos 1 punto por distancia recorrida
  if (frameCount % 30 === 0) {
    puntaje += 1;
  }
}

// ============================================================
//  DETECCIÓN DE COLISIONES
// ============================================================

/**
 * AABB (Axis-Aligned Bounding Box):
 * Detecta si dos rectángulos se solapan comparando sus bordes.
 * Retorna true si hay intersección.
 *
 * La condición de NO colisión es que:
 *   alguno está totalmente a la izquierda / derecha / arriba / abajo del otro.
 * Negamos eso para obtener cuándo SÍ hay colisión.
 */
function colisionAABB(a, b) {
  // Márgenes de tolerancia para hacer el hitbox un poco más pequeño
  // que el sprite visible (se siente más "justo")
  const margenA = 8;
  const margenB = 6;

  return (
    a.x + margenA         < b.x + b.w - margenB &&
    a.x + a.w - margenA  > b.x + margenB         &&
    a.y + margenA         < b.y + b.h - margenB   &&
    a.y + a.h - margenA  > b.y + margenB
  );
}

/**
 * Colisión circular:
 * Calcula la distancia entre los centros de dos objetos.
 * Si la distancia es menor que la suma de sus radios, hay colisión.
 * Ideal para objetos circulares como monedas.
 */
function colisionCircular(a, b) {
  // Centro del jugador
  let cx1 = a.x + a.w / 2;
  let cy1 = a.y + a.h / 2;
  let r1  = min(a.w, a.h) / 2;

  // Centro de la moneda
  let cx2 = b.x;
  let cy2 = b.y;
  let r2  = b.radio;

  // Distancia euclidiana entre centros
  let distancia = dist(cx1, cy1, cx2, cy2);

  return distancia < r1 + r2 + 4; // +4 px de tolerancia adicional
}

// ============================================================
//  GAME OVER
// ============================================================
function activarGameOver() {
  estado = 'gameOver';
}

function mostrarGameOver() {
  // Seguimos dibujando el mundo "congelado"
  jugador.show();
  for (let o of obstaculos) o.show();
  for (let m of monedas)    m.show();

  // Overlay semitransparente
  fill(0, 0, 0, 160);
  noStroke();
  rect(0, 0, ANCHO, ALTO);

  // Texto de game over con efecto neón
  textAlign(CENTER, CENTER);

  // Sombra de brillo
  fill(255, 0, 60, 100);
  textSize(72);
  text('GAME OVER', ANCHO / 2 + 3, ALTO / 2 - 50 + 3);

  fill(255, 60, 100);
  textSize(72);
  text('GAME OVER', ANCHO / 2, ALTO / 2 - 50);

  textSize(22);
  fill(255, 220, 100);
  text(`Puntaje: ${puntaje}`, ANCHO / 2, ALTO / 2 + 20);

  textSize(16);
  fill(180, 180, 255);
  text('Presiona R para reiniciar', ANCHO / 2, ALTO / 2 + 60);
}

// ============================================================
//  PANTALLA DE CARGA (mientras el modelo carga)
// ============================================================
function mostrarCarga() {
  textAlign(CENTER, CENTER);

  if (!juegoIniciado) {
    // No se ha presionado el botón aún
    textSize(18);
    fill(100, 255, 200);
    text('Presiona INICIAR JUEGO', ANCHO / 2, ALTO / 2);
    return;
  }

  if (!modeloCargado) {
    // Animación de puntos para indicar carga
    let puntos = '.'.repeat((frameCount % 60 < 20) ? 1 : (frameCount % 60 < 40) ? 2 : 3);
    textSize(20);
    fill(100, 220, 255);
    text(`Cargando modelo${puntos}`, ANCHO / 2, ALTO / 2 - 20);

    textSize(14);
    fill(160, 160, 200);
    text('(se necesita conexión a internet y la URL del modelo)', ANCHO / 2, ALTO / 2 + 20);
  } else {
    // Modelo listo, iniciamos el juego
    estado    = 'jugando';
    frameInicio = frameCount;
  }
}

// ============================================================
//  HUD – Heads Up Display (puntaje en pantalla)
// ============================================================
function dibujarHUD() {
  // Distancia recorrida (en metros ficticios)
  let distancia = floor((frameCount - frameInicio) / 30);

  textAlign(LEFT, TOP);
  noStroke();

  // Sombra del texto para mayor legibilidad
  fill(0, 0, 0, 120);
  textSize(20);
  text(`⭐ ${puntaje}`, ANCHO - 148, 18);
  text(`📏 ${distancia}m`,  ANCHO - 148, 45);

  fill(255, 230, 50);
  textSize(20);
  text(`⭐ ${puntaje}`, ANCHO - 150, 16);

  fill(100, 200, 255);
  text(`📏 ${distancia}m`, ANCHO - 150, 44);
}

// ============================================================
//  VISOR DE CÁMARA (esquina inferior derecha, efecto espejo)
// ============================================================
function mostrarCamara() {
  if (!captura) return;

  const CW = 180; // ancho del visor
  const CH = 135; // alto del visor
  const PX = ANCHO - CW - 16; // posición X
  const PY = ALTO  - CH - 50; // posición Y (espacio para la etiqueta abajo)

  // Marco decorativo
  stroke(0, 255, 200);
  strokeWeight(2);
  noFill();
  rect(PX - 2, PY - 2, CW + 4, CH + 4, 6);

  // Guardamos el estado de transformación antes de espejear
  push();
  // Traslación + escala negativa en X para efecto espejo
  // Matemática: translate mueve el origen al borde derecho del visor,
  // luego scale(-1,1) invierte el eje X alrededor de ese origen.
  translate(PX + CW, PY);
  scale(-1, 1);
  image(captura, 0, 0, CW, CH);
  pop();

  // Etiqueta de debug – estado del modelo
  noStroke();
  fill(0, 0, 0, 150);
  rect(PX - 2, PY + CH + 2, CW + 4, 42, 4);

  textAlign(CENTER, TOP);
  textSize(13);
  fill(0, 255, 150);
  text(`🤖 ${etiquetaActual}`, PX + CW / 2, PY + CH + 6);

  textSize(11);
  fill(180, 180, 255);
  let porcentaje = nf(confianzaActual * 100, 1, 1);
  text(`Confianza: ${porcentaje}%`, PX + CW / 2, PY + CH + 24);
}

// ============================================================
//  AMBIENTE – suelo, techo y líneas de guía
// ============================================================
function dibujarAmbiente() {
  // Suelo
  fill(20, 40, 80);
  noStroke();
  rect(0, SUELO, ANCHO, ALTO - SUELO);

  // Línea neón del suelo
  stroke(0, 180, 255);
  strokeWeight(2);
  line(0, SUELO, ANCHO, SUELO);

  // Techo
  fill(10, 20, 50);
  noStroke();
  rect(0, 0, ANCHO, TECHO);

  // Línea neón del techo
  stroke(0, 180, 255, 180);
  strokeWeight(1);
  line(0, TECHO, ANCHO, TECHO);
}

// ============================================================
//  FONDO PARALLAX
// Cada "capa" tiene rectángulos de fondo que se mueven
// a diferentes velocidades para simular profundidad.
// Capas más lejanas → más lentas y oscuras.
// ============================================================
function inicializarParallax() {
  capas = [
    // Capa 0 – lejana (estrellas/puntos de fondo)
    { velocidad: 0.3, objetos: crearObjetosBack(40, 2, 4,  [20, 20, 60]) },
    // Capa 1 – media (estructuras lejanas)
    { velocidad: 1.2, objetos: crearObjetosBack(15, 30, 60, [10, 20, 50]) },
    // Capa 2 – cercana (estructuras frontales)
    { velocidad: 2.5, objetos: crearObjetosBack(8,  50, 100, [0, 30, 70]) }
  ];
}

/**
 * Crea objetos de fondo con posiciones aleatorias.
 * @param {number} cantidad - cuántos objetos crear
 * @param {number} minH     - altura mínima del objeto
 * @param {number} maxH     - altura máxima del objeto
 * @param {number[]} color  - color RGB base
 */
function crearObjetosBack(cantidad, minH, maxH, col) {
  let lista = [];
  for (let i = 0; i < cantidad; i++) {
    lista.push({
      x: random(ANCHO),
      y: random(TECHO, SUELO - maxH),
      w: random(10, 40),
      h: random(minH, maxH),
      col: col
    });
  }
  return lista;
}

function dibujarParallax() {
  for (let capa of capas) {
    for (let obj of capa.objetos) {
      // Mover el objeto hacia la izquierda según su velocidad
      obj.x -= capa.velocidad;

      // Si sale por la izquierda, reaparece por la derecha
      if (obj.x + obj.w < 0) {
        obj.x = ANCHO + random(50);
        obj.y = random(TECHO, SUELO - obj.h);
      }

      // Dibujar el rectángulo de fondo con color semitransparente
      noStroke();
      fill(obj.col[0], obj.col[1], obj.col[2], 140);
      rect(obj.x, obj.y, obj.w, obj.h, 2);
    }
  }
}

// ============================================================
//  ENTRADA DE TECLADO
// ============================================================
function keyPressed() {
  // R → reiniciar partida
  if (key === 'r' || key === 'R') {
    reiniciar();
  }
  // Espacio → control manual de respaldo (para pruebas sin modelo)
  if (key === ' ') {
    if (estado === 'jugando') jugador.volar();
  }
}

function keyReleased() {
  // Al soltar espacio se puede agregar lógica extra si es necesario
}

function reiniciar() {
  puntaje     = 0;
  obstaculos  = [];
  monedas     = [];
  particulas  = [];
  jugador     = new Player(120, ALTO / 2);
  frameInicio = frameCount;
  estado      = 'jugando';
  inicializarParallax();
}

// ============================================================
//  CLASE: Player (El jugador)
// ============================================================
class Player {
  /**
   * @param {number} x - posición X fija (a la izquierda)
   * @param {number} y - posición Y inicial (centro vertical)
   */
  constructor(x, y) {
    this.x  = x;
    this.y  = y;
    this.w  = 40; // ancho del sprite
    this.h  = 50; // alto del sprite
    this.vy = 0;  // velocidad vertical (positivo = baja, negativo = sube)
    this.volando = false; // ¿jetpack activo?
    this.animFrame = 0;   // frame de animación actual
  }

  /**
   * MÉTODO: volar()
   * Activa el jetpack. Se llama cada frame que la mano está "Abierta".
   *
   * Física de jetpack:
   *   vy = vy - FUERZA_JETPACK
   *   Acumulamos fuerza hacia arriba (vy negativa) en contra de la gravedad.
   *   Esto simula el empuje del propulsor.
   */
  volar() {
    this.vy -= FUERZA_JETPACK;
    this.volando = true;
    // Emitir partículas de escape del jetpack
    this.emitirParticulas();
  }

  /**
   * MÉTODO: update()
   * Aplica física cada frame:
   *   1. Aplica gravedad (incrementa vy positivamente → baja)
   *   2. Integra vy en la posición y
   *   3. Limita la velocidad para evitar velocidades infinitas
   *   4. Detecta colisión con suelo y techo
   *
   * Integración de Euler (simple y efectiva para juegos 2D):
   *   vy += GRAVEDAD   (aceleración → velocidad)
   *   y  += vy         (velocidad  → posición)
   */
  update() {
    // 1. Aplicar gravedad (siempre, independientemente del jetpack)
    this.vy += GRAVEDAD;

    // 2. Limitar velocidad de caída (terminal velocity)
    this.vy = constrain(this.vy, -VEL_MAXIMA, VEL_MAXIMA);

    // 3. Integrar posición
    this.y += this.vy;

    // 4. Colisión con el suelo
    if (this.y + this.h >= SUELO) {
      this.y  = SUELO - this.h;
      this.vy = 0;
    }

    // 5. Colisión con el techo
    if (this.y <= TECHO) {
      this.y  = TECHO;
      this.vy = 0;
    }

    // Resetear flag de vuelo (se activa de nuevo si volar() es llamado)
    this.volando = false;

    // Animar el sprite
    this.animFrame = (this.animFrame + 1) % 60;
  }

  /**
   * MÉTODO: show()
   * Dibuja el jugador con formas primitivas de p5.js.
   *
   * TODO: Reemplazar con image(spriteJugador, this.x, this.y, this.w, this.h)
   *       cuando tengamos el spritesheet final.
   */
  show() {
    let cx = this.x + this.w / 2;
    let cy = this.y + this.h / 2;

    // ── Efecto de brillo (glow) alrededor del personaje ──
    // Dibujamos círculos concéntricos semitransparentes
    noStroke();
    fill(0, 200, 255, 20);
    ellipse(cx, cy, this.w + 30, this.h + 30);
    fill(0, 200, 255, 15);
    ellipse(cx, cy, this.w + 50, this.h + 50);

    // ── Cuerpo principal (traje de vuelo) ────────────────
    // Degradado simulado con dos rectángulos
    fill(0, 180, 255);
    stroke(0, 230, 255);
    strokeWeight(2);
    rect(this.x + 4, this.y + 5, this.w - 8, this.h - 10, 8);

    // ── Cabeza ───────────────────────────────────────────
    fill(0, 220, 255);
    stroke(0, 255, 255);
    strokeWeight(1);
    ellipse(cx - 2, this.y + 4, 26, 26);

    // ── Visor del casco (detalle) ─────────────────────────
    fill(255, 200, 50, 200);
    noStroke();
    ellipse(cx - 2, this.y + 2, 14, 10);

    // ── Jetpack (caja detrás del personaje) ──────────────
    fill(80, 80, 120);
    stroke(120, 120, 200);
    strokeWeight(1);
    rect(this.x - 14, this.y + 10, 18, 30, 4);

    // ── Llamas del jetpack (si está volando) ─────────────
    if (this.volando || this.animFrame % 10 < 5) {
      // Llama naranja
      noStroke();
      fill(255, 120, 0, 200);
      triangle(
        this.x - 16, this.y + 35,
        this.x - 5,  this.y + 35,
        this.x - 10, this.y + 35 + random(8, 20)
      );
      // Núcleo amarillo
      fill(255, 240, 0, 180);
      triangle(
        this.x - 14, this.y + 35,
        this.x - 8,  this.y + 35,
        this.x - 11, this.y + 35 + random(4, 12)
      );
    }

    // ── Botas ─────────────────────────────────────────────
    fill(0, 100, 180);
    noStroke();
    rect(this.x + 6,  this.y + this.h - 8, 10, 8, 3);
    rect(this.x + 20, this.y + this.h - 8, 10, 8, 3);
  }

  /**
   * Emite partículas desde el jetpack.
   * Las partículas nacen en la posición del jetpack (detrás del jugador).
   */
  emitirParticulas() {
    for (let i = 0; i < 3; i++) {
      particulas.push(new Particula(
        this.x - 10,
        this.y + 35
      ));
    }
  }
}

// ============================================================
//  CLASE: Obstacle (Obstáculos – Zappers y Misiles)
// ============================================================
class Obstacle {
  constructor() {
    // Los obstáculos aparecen en el borde derecho del canvas
    this.x = ANCHO + 20;

    // Tipo aleatorio: 0 = zapper vertical, 1 = misil horizontal
    this.tipo = floor(random(2));

    if (this.tipo === 0) {
      // Zapper: barra vertical centrada en una posición aleatoria
      this.w = 20;
      this.h = random(80, 200);
      // Posición aleatoria respetando suelo y techo
      this.y = random(TECHO + 10, SUELO - this.h - 10);
    } else {
      // Misil: rectángulo horizontal que viene en una altura aleatoria
      this.w = 70;
      this.h = 25;
      this.y = random(TECHO + 10, SUELO - this.h - 10);
    }

    this.vel = VEL_MUNDO + random(0, 1.5); // velocidad con leve variación
    this.animFrame = 0;
  }

  /**
   * MÉTODO: update()
   * Mueve el obstáculo hacia la izquierda.
   * Física simple: x = x - vel
   */
  update() {
    this.x -= this.vel;
    this.animFrame++;
  }

  /**
   * MÉTODO: show()
   * Dibuja el obstáculo con formas primitivas.
   *
   * TODO: Reemplazar con image(spriteZapper, this.x, this.y, this.w, this.h)
   *       o image(spriteMisil, this.x, this.y, this.w, this.h)
   *       cuando tengamos los assets finales.
   */
  show() {
    if (this.tipo === 0) {
      // ── Zapper (barra eléctrica) ─────────────────────────
      // Efecto de parpadeo eléctrico alternando la opacidad
      let brillo = (this.animFrame % 10 < 5) ? 255 : 180;

      // Cuerpo del zapper
      fill(255, 60, 0);
      stroke(255, 150, 0, brillo);
      strokeWeight(3);
      rect(this.x, this.y, this.w, this.h, 4);

      // Línea de energía central
      stroke(255, 255, 100, brillo);
      strokeWeight(2);
      line(this.x + this.w / 2, this.y + 5,
           this.x + this.w / 2, this.y + this.h - 5);

      // Chispa animada en el centro
      noStroke();
      fill(255, 255, 50, brillo);
      let chY = this.y + random(this.h);
      ellipse(this.x + this.w / 2, chY, 6, 6);

    } else {
      // ── Misil ────────────────────────────────────────────
      // Cuerpo del misil
      fill(200, 50, 255);
      stroke(255, 100, 255);
      strokeWeight(2);
      rect(this.x + 15, this.y, this.w - 15, this.h, 4);

      // Punta del misil (triángulo)
      noStroke();
      fill(255, 50, 200);
      triangle(
        this.x + 15, this.y,
        this.x + 15, this.y + this.h,
        this.x,      this.y + this.h / 2
      );

      // Llama trasera del misil
      fill(255, 150, 0, 200 - (this.animFrame % 20) * 5);
      triangle(
        this.x + this.w, this.y + 4,
        this.x + this.w, this.y + this.h - 4,
        this.x + this.w + random(15, 30), this.y + this.h / 2
      );

      // Ventana del misil
      fill(100, 255, 255, 180);
      noStroke();
      ellipse(this.x + 30, this.y + this.h / 2, 12, 10);
    }
  }
}

// ============================================================
//  CLASE: Coin (Monedas coleccionables)
// ============================================================
class Coin {
  constructor() {
    this.x     = ANCHO + 10; // aparece a la derecha
    this.y     = random(TECHO + 30, SUELO - 30);
    this.radio = 12;          // radio para colisión circular
    this.vel   = VEL_MUNDO;
    this.angulo = 0;          // ángulo de rotación para animación
  }

  /**
   * MÉTODO: update()
   * Mueve la moneda y la anima (rotación visual).
   */
  update() {
    this.x     -= this.vel;
    this.angulo += 0.05; // rotación continua para efecto de giro
  }

  /**
   * MÉTODO: show()
   * Dibuja la moneda como un círculo neón animado.
   *
   * TODO: Reemplazar con image(spriteMoneda, this.x - this.radio, this.y - this.radio,
   *                            this.radio * 2, this.radio * 2)
   *       cuando tengamos los assets finales.
   */
  show() {
    // Efecto de escala animado simulando rotación en 3D
    // Usamos abs(sin) para que el ancho oscile entre 0 y 1 (como si girara)
    let escalaX = abs(sin(this.angulo));
    let anchoVisible = this.radio * 2 * escalaX;

    // Brillo exterior
    noStroke();
    fill(255, 220, 0, 50);
    ellipse(this.x, this.y, (this.radio + 8) * 2, (this.radio + 8) * 2);

    // Cuerpo de la moneda
    fill(255, 210, 0);
    stroke(255, 240, 100);
    strokeWeight(2);
    ellipse(this.x, this.y, anchoVisible + 2, this.radio * 2 + 2);

    // Interior brillante
    noStroke();
    fill(255, 255, 150);
    ellipse(this.x, this.y, anchoVisible * 0.6, this.radio * 1.2);

    // Símbolo "$" (solo cuando la moneda está de frente)
    if (escalaX > 0.5) {
      fill(200, 120, 0);
      textAlign(CENTER, CENTER);
      textSize(12);
      noStroke();
      text('$', this.x, this.y);
    }
  }
}

// ============================================================
//  CLASE: Particula (Efectos visuales del jetpack)
// ============================================================
class Particula {
  /**
   * @param {number} x - posición X inicial (boca del jetpack)
   * @param {number} y - posición Y inicial
   */
  constructor(x, y) {
    this.x    = x + random(-4, 4);
    this.y    = y + random(-2, 2);
    this.vx   = random(-3, -1); // se mueve hacia la izquierda (escape)
    this.vy   = random(-1, 1);  // leve movimiento vertical aleatorio
    this.vida = 255;            // opacidad inicial (255 = completamente opaco)
    this.tam  = random(4, 10);  // tamaño inicial de la partícula

    // Color aleatorio entre naranja y amarillo
    this.r = random(220, 255);
    this.g = random(60, 200);
    this.b = 0;
  }

  /**
   * MÉTODO: update()
   * Mueve la partícula y reduce su vida (fade out).
   */
  update() {
    this.x   += this.vx;
    this.y   += this.vy;
    this.vida -= 12; // la partícula desaparece gradualmente
    this.tam  -= 0.3;
  }

  /**
   * MÉTODO: show()
   * Dibuja la partícula como un círculo con opacidad decreciente.
   */
  show() {
    noStroke();
    fill(this.r, this.g, this.b, this.vida);
    ellipse(this.x, this.y, max(0, this.tam), max(0, this.tam));
  }

  /**
   * MÉTODO: muerta()
   * Retorna true cuando la partícula ya no es visible y debe eliminarse.
   */
  muerta() {
    return this.vida <= 0 || this.tam <= 0;
  }
}

//
//  1. setup():         createCapture(VIDEO) → captura
